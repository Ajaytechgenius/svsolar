<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar Experience | SVSOLAR</title>
<meta name="description" content="Experience premium interactive 3D solar panel technology by Shree Vinayak Solar Agency.">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0b1220;
  --navy-light:#111a2e;
  --gold:#d4af37;
  --gold-light:#ffdf70;
  --gray:#9aa4b2;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Manrope',sans-serif;
  background:radial-gradient(circle at top,var(--navy-light),var(--navy));
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Animated Glow Background */
.sun-glow{
  position:absolute;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(212,175,55,0.35) 0%,transparent 70%);
  border-radius:50%;
  animation:pulse 6s infinite ease-in-out;
  z-index:-1;
}

@keyframes pulse{
  0%,100%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.1);}
}

/* Content */
.container{
  max-width:900px;
  padding:20px;
}

.logo{
  font-family:'Fraunces',serif;
  font-size:1.2rem;
  letter-spacing:2px;
  color:var(--gold);
  margin-bottom:20px;
}

h1{
  font-family:'Fraunces',serif;
  font-size:2.5rem;
  margin-bottom:10px;
}

p{
  color:var(--gray);
  margin-bottom:40px;
}

/* 3D Solar Panel */
.panel-wrapper{
  perspective:1200px;
  display:flex;
  justify-content:center;
}

.panel{
  width:320px;
  height:200px;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  border-radius:12px;
  transform-style:preserve-3d;
  transition:transform .15s ease;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
  position:relative;
}

/* grid lines */
.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.15) 1px, transparent 1px);
  background-size:30px 30px;
  border-radius:12px;
}

/* shine effect */
.panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25),transparent 70%);
  border-radius:12px;
  opacity:.4;
}

/* CTA */
.btn{
  display:inline-block;
  margin-top:40px;
  padding:14px 32px;
  background:var(--gold);
  color:#000;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  transition:.3s;
}

.btn:hover{
  background:var(--gold-light);
  transform:translateY(-3px);
}

footer{
  position:absolute;
  bottom:20px;
  width:100%;
  font-size:.8rem;
  color:var(--gray);
}
footer a{color:var(--gold);text-decoration:none}

@media(max-width:600px){
  .panel{width:260px;height:160px}
  h1{font-size:1.8rem}
}
</style>
</head>

<body>

<div class="sun-glow"></div>

<div class="container">

<div class="logo">SVSOLAR</div>

<h1>Interactive 3D Solar Panel</h1>
<p>Move your cursor and feel the precision engineering.</p>

<div class="panel-wrapper">
  <div class="panel" id="panel"></div>
</div>

<a href="https://svsolar.online" class="btn">Back to Homepage</a>

</div>

<footer>
© 2026 Shree Vinayak Solar Agency · 
<a href="https://svsolar.online">svsolar.online</a>
</footer>

<script>
const panel = document.getElementById("panel");

document.addEventListener("mousemove", (e) => {
  const x = (window.innerWidth / 2 - e.clientX) / 25;
  const y = (window.innerHeight / 2 - e.clientY) / 25;
  panel.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* Reset on mouse leave */
document.addEventListener("mouseleave", () => {
  panel.style.transform = "rotateY(0deg) rotateX(0deg)";
});
</script>

</body>
</html>
